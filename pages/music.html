<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Music Room | My Little Corner</title>

<link rel="stylesheet"
href="../css/music.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap"
rel="stylesheet">

</head>

<body>

<div class="overlay">

<a href="cafe.html" class="backButton">

← Back to Café

</a>

<header>

<h1>

The Music Room

</h1>

<p>

Take a seat.

Enjoy a warm drink.

Stay awhile.

</p>

</header>

<main>

<div class="player">

<div class="recordPlayer">

<div class="vinyl">

<div class="label">

♫

</div>

</div>

</div>

<h2>

Now Playing

</h2>

<h3>

Rainy Café Ambience

</h3>

<div class="controls">

<button id="playButton">

▶

</button>

<button id="pauseButton">

❚❚

</button>

</div>

<div class="progressBar">

<div id="progress"></div>

</div>

<div class="volume">

<label>

Volume

</label>

<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="0.5">

</div>

</div>

</main>

<footer>

Music makes little corners feel like home.

</footer>

<audio id="music">

<source
src="../audio/song1.mp3"
type="audio/mpeg">

</audio>

<script src="../js/music.js"></script>

</body>

</html>
