<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Little Corner</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="../css/cafe-radio.css">
    <script src="../js/cafe-radio.js"></script>

</head>

<body>

    <!-- Mouse Glow -->
    <div id="cursor-glow"></div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Page Overlay -->
    <div class="overlay">

        <!-- Decorations -->

        <div class="flower flower1">🌸</div>
        <div class="flower flower2">🍃</div>
        <div class="flower flower3">☕</div>

        <!-- Main Card -->

        <main class="welcome-card">

            <p class="welcome-small">

                Welcome to

            </p>

            <h1>

                My Little Corner

            </h1>

            <div class="divider"></div>

            <p class="description">

                Take a seat.

                <br><br>

                Enjoy a warm drink,
                wander through memories,
                discover hidden places,
                and stay awhile.

            </p>

            <button id="beginButton">

                Begin Your Journey →

            </button>

            <p class="headphones">

                ♫ Best enjoyed with headphones

            </p>

        </main>

        <!-- Scroll Hint -->

        <div class="scroll-indicator">

            <span>Scroll</span>

            <div class="arrow">

                ↓

            </div>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        Created with warmth and a little imagination.

    </footer>

    <!-- JavaScript -->

    <script src="js/script.js"></script>

</body>

</html>
